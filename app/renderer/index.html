<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>d2rive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>d2rive</h1>
    </header>

    <section id="active-section">
      <div class="section-title">Active Mounts</div>
      <div id="mounts-list"><div class="empty-hint">No active mounts</div></div>
    </section>

    <section id="share-section">
      <div class="section-title">Share Folder</div>
      <button id="btn-share" class="btn-primary">Select Folder to Share&hellip;</button>
      <div id="share-card" class="hidden">
        <div class="card-label">Drive Key &mdash; share this with others:</div>
        <div class="key-row">
          <code id="share-key-text"></code>
          <button id="btn-copy-key" class="btn-small">Copy</button>
        </div>
        <div class="save-row">
          <input id="save-name-input" class="save-name-input" placeholder="Save as name&hellip;">
          <button id="btn-save-shared-key" class="btn-small">Save</button>
        </div>
      </div>
    </section>

    <section id="mount-section">
      <div class="section-title">Mount Drive</div>
      <input id="key-input" type="text" placeholder="64-character hex key" spellcheck="false">
      <div id="mount-path-row">
        <span id="mount-path-label" class="path-hint">No folder selected</span>
        <button id="btn-pick-folder" class="btn-small">Select&hellip;</button>
      </div>
      <button id="btn-connect" class="btn-primary" disabled>Connect</button>
      <div id="mount-status-msg"></div>
    </section>

    <section id="saved-section">
      <div class="section-title">Saved Drives</div>
      <div id="saved-list"><div class="empty-hint">No saved drives</div></div>
    </section>

    <footer>
      <label class="auto-start-label">
        <input type="checkbox" id="auto-start-cb">
        Start at login
      </label>
      <button id="btn-quit" class="btn-secondary">Quit</button>
    </footer>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
