<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>d2rive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>d2rive</h1>
    </header>

    <section id="active-section">
      <div class="section-title">Active Mounts</div>
      <div id="mounts-list"><div class="empty-hint">No active mounts</div></div>
    </section>

    <section id="share-section">
      <div class="section-title">Share Folder</div>
      <label class="toggle-label">
        <input type="checkbox" id="share-writable-cb">
        Allow editing by watchers
      </label>
      <button id="btn-share" class="btn-primary">Select Folder to Share&hellip;</button>
      <div id="share-card" class="hidden">
        <div class="card-label">Drive Key &mdash; share this with others:</div>
        <div class="key-row">
          <code id="share-key-text"></code>
          <button id="btn-copy-key" class="btn-small">Copy</button>
        </div>
      </div>
    </section>

    <section id="sync-section">
      <div class="section-title">Sync Folder</div>
      <button id="btn-sync-create" class="btn-primary">Select Folder to Sync&hellip;</button>
      <div id="sync-card" class="hidden">
        <div class="card-label">Sync Key &mdash; share this to let others join:</div>
        <div class="key-row">
          <code id="sync-key-text"></code>
          <button id="btn-copy-sync-key" class="btn-small">Copy</button>
        </div>
      </div>
      <div class="section-title" style="margin-top:6px;">Join Sync</div>
      <input id="sync-key-input" type="text" placeholder="64-character sync key" spellcheck="false" style="font-family:'SF Mono',Menlo,monospace;font-size:11px;width:100%;padding:6px 8px;border:1px solid #d1d1d6;border-radius:6px;outline:none;">
      <div id="sync-join-path-row" style="display:flex;align-items:center;gap:8px;margin-top:4px;">
        <span id="sync-join-path-label" class="path-hint">Enter key to set default folder</span>
        <button id="btn-sync-join-folder" class="btn-small">Change&hellip;</button>
      </div>
      <div id="sync-join-warning" class="mount-warning hidden"></div>
      <button id="btn-sync-join" class="btn-primary" disabled style="margin-top:4px;">Join Sync</button>
      <div id="sync-join-status-msg" style="font-size:11px;color:#ff3b30;min-height:14px;"></div>
    </section>

    <section id="mount-section">
      <div class="section-title">Watch Drive</div>
      <input id="key-input" type="text" placeholder="64-character hex key" spellcheck="false">
      <div id="mount-path-row">
        <span id="mount-path-label" class="path-hint">Enter key to set default folder</span>
        <button id="btn-pick-folder" class="btn-small">Change&hellip;</button>
      </div>
      <div id="mount-warning" class="mount-warning hidden"></div>
      <button id="btn-connect" class="btn-primary" disabled>Watch</button>
      <div id="mount-status-msg"></div>
    </section>

    <section id="saved-section">
      <div class="section-header">
        <div class="section-title">Saved Drives</div>
        <button id="btn-saved-add" class="btn-small">Add</button>
      </div>
      <div id="saved-add-card" class="info-card hidden">
        <input id="saved-add-name" type="text" placeholder="Name" spellcheck="false">
        <input id="saved-add-key" type="text" placeholder="64-character hex key" spellcheck="false" style="font-family:'SF Mono',Menlo,monospace;font-size:11px;">
        <div id="saved-add-folder-row" style="display:flex;align-items:center;gap:8px;">
          <span id="saved-add-folder-label" class="path-hint" style="font-size:11px;">No folder (will ask when watching)</span>
          <button id="btn-saved-add-folder" class="btn-small">Set&hellip;</button>
        </div>
        <div class="btn-row">
          <button id="btn-saved-add-save" class="btn-primary">Save</button>
          <button id="btn-saved-add-cancel" class="btn-secondary">Cancel</button>
        </div>
      </div>
      <div id="saved-list"><div class="empty-hint">No saved drives</div></div>
    </section>

    <footer>
      <label class="auto-start-label">
        <input type="checkbox" id="auto-start-cb">
        Start at login
      </label>
      <button id="btn-quit" class="btn-secondary">Quit</button>
    </footer>
  </div>
<script src="renderer.js"></script>
</body>
</html>
